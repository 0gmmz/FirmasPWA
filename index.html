<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#1C1C1E" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Resguardos" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<title>Firma de resguardos</title>
<style>
  :root{
    --bg:#FAFAF9; --surface:#FFFFFF; --surface-2:#F5F5F4;
    --ink:#1C1C1E; --muted:#78716C; --faint:#A8A29E;
    --border:#E7E5E4; --border-strong:#D6D3D1;
    --amber:#D97706; --amber-bg:#FEF3C7;
    --green:#15803D; --green-bg:#DCFCE7;
    --blue:#1D4ED8; --blue-bg:#DBEAFE;
    --red:#DC2626;  --red-bg:#FEE2E2;
    --radius:14px; --radius-sm:10px; --radius-xs:8px;
    --shadow:0 1px 2px rgba(28,28,30,.05), 0 8px 24px -16px rgba(28,28,30,.18);
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, "Inter", "Helvetica Neue", Arial, sans-serif;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; }
  body{
    font-family:var(--sans); color:var(--ink); background:var(--bg);
    font-size:15px; line-height:1.45; overscroll-behavior:none;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  button{ font-family:inherit; font-size:inherit; cursor:pointer; border:none; background:none; color:inherit; }
  button:focus-visible, [tabindex]:focus-visible{ outline:2px solid var(--ink); outline-offset:2px; border-radius:6px; }
  .mono{ font-family:var(--mono); }

  /* ---------- App shell ---------- */
  #app{ max-width:880px; margin:0 auto; padding:0 16px 96px; }

  header.bar{
    position:sticky; top:0; z-index:20; background:rgba(250,250,249,.86);
    backdrop-filter:saturate(1.4) blur(10px);
    -webkit-backdrop-filter:saturate(1.4) blur(10px);
    padding:14px 0 10px; margin:0 -16px 4px; padding-left:16px; padding-right:16px;
    border-bottom:1px solid var(--border);
  }
  .brand{ display:flex; align-items:center; gap:10px; }
  .glyph{ width:30px; height:30px; flex:0 0 auto; }
  .brand h1{ font-size:17px; font-weight:650; letter-spacing:-.01em; margin:0; }
  .brand .sub{ font-family:var(--mono); font-size:11px; color:var(--faint); letter-spacing:.04em; text-transform:uppercase; }

  .toolbar{ display:flex; gap:8px; margin-top:12px; }
  .search{ position:relative; flex:1; }
  .search input{
    width:100%; border:1px solid var(--border-strong); background:var(--surface);
    border-radius:var(--radius-sm); padding:10px 12px 10px 36px; font-size:15px; color:var(--ink);
  }
  .search input::placeholder{ color:var(--faint); }
  .search svg{ position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--faint); }
  .btn{
    display:inline-flex; align-items:center; gap:7px; justify-content:center;
    border-radius:var(--radius-sm); padding:10px 14px; font-weight:550; white-space:nowrap;
    border:1px solid transparent; transition:transform .04s ease, background .12s ease;
  }
  .btn:active{ transform:translateY(1px); }
  .btn-primary{ background:var(--ink); color:#fff; }
  .btn-primary:hover{ background:#000; }
  .btn-ghost{ background:var(--surface); border-color:var(--border-strong); color:var(--ink); }
  .btn-ghost:hover{ background:var(--surface-2); }
  .btn-sm{ padding:8px 11px; font-size:13.5px; }
  .btn-icon{ padding:10px; }

  /* ---------- Dashboard ---------- */
  .dash{ display:flex; gap:8px; margin:14px 0 6px; overflow-x:auto; padding-bottom:2px; scrollbar-width:none; }
  .dash::-webkit-scrollbar{ display:none; }
  .stat{
    flex:1 0 auto; min-width:104px; text-align:left; background:var(--surface);
    border:1px solid var(--border); border-radius:var(--radius); padding:11px 13px;
    display:flex; flex-direction:column; gap:2px; transition:border-color .12s ease, box-shadow .12s ease;
  }
  .stat:hover{ box-shadow:var(--shadow); }
  .stat[aria-pressed="true"]{ border-color:var(--ink); box-shadow:0 0 0 1px var(--ink) inset; }
  .stat .n{ font-family:var(--mono); font-size:23px; font-weight:600; letter-spacing:-.02em; line-height:1; }
  .stat .l{ display:flex; align-items:center; gap:6px; font-size:12.5px; color:var(--muted); }
  .swatch{ width:9px; height:9px; border-radius:3px; flex:0 0 auto; }
  .sw-pend{ background:var(--amber); } .sw-firm{ background:var(--green); }
  .sw-exp{ background:var(--blue); } .sw-all{ background:var(--ink); }

  .listmeta{ display:flex; align-items:center; justify-content:space-between; margin:14px 2px 8px; }
  .listmeta .count{ font-family:var(--mono); font-size:12px; color:var(--faint); letter-spacing:.03em; }
  .listmeta .trash-link{ font-size:12.5px; color:var(--muted); display:inline-flex; gap:5px; align-items:center; }
  .listmeta .trash-link:hover{ color:var(--red); }

  .queuebar{
    display:none; align-items:center; justify-content:space-between; gap:10px;
    background:var(--blue-bg); border:1px solid #BFDBFE; color:var(--blue);
    border-radius:var(--radius); padding:9px 9px 9px 13px; margin:0 0 10px;
  }
  .queuebar.show{ display:flex; }
  .queuebar span{ font-size:13.5px; font-weight:550; }

  .folderbar{
    display:none; align-items:center; justify-content:space-between; gap:10px;
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:8px 8px 8px 12px; margin:14px 0 0;
  }
  .folderbar.show{ display:flex; }
  .fb-info{ display:flex; align-items:center; gap:9px; min-width:0; color:var(--muted); }
  .fb-text{ display:flex; flex-direction:column; min-width:0; }
  .fb-text b{ font-size:13.5px; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:46vw; }
  .fb-text span{ font-family:var(--mono); font-size:10.5px; color:var(--faint); letter-spacing:.02em; }
  .fb-actions{ display:flex; gap:6px; flex:0 0 auto; }

  /* ---------- Cards ---------- */
  .list{ display:flex; flex-direction:column; gap:9px; }
  .card{
    position:relative; background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius); padding:13px 14px 13px 18px; overflow:hidden;
    display:flex; flex-direction:column; gap:11px;
  }
  .card::before{ content:""; position:absolute; left:0; top:0; bottom:0; width:5px; background:var(--border-strong); }
  .card.s-pendiente::before{ background:var(--amber); }
  .card.s-firmado::before{ background:var(--green); }
  .card.s-por_exportar::before{ background:var(--blue); }
  .card.s-eliminado::before{ background:var(--red); }
  .card-top{ display:flex; align-items:flex-start; gap:12px; }
  .card-main{ flex:1; min-width:0; }
  .card .name{ font-weight:600; font-size:15px; letter-spacing:-.005em; word-break:break-word; }
  .card .meta{ font-family:var(--mono); font-size:11.5px; color:var(--faint); margin-top:3px; letter-spacing:.02em; }
  .card .meta b{ color:var(--muted); font-weight:600; }
  .doc-ico{ width:34px; height:42px; flex:0 0 auto; }

  .badge{
    display:inline-flex; align-items:center; gap:6px; font-family:var(--mono);
    font-size:11px; font-weight:600; letter-spacing:.04em; text-transform:uppercase;
    padding:4px 9px; border-radius:999px; white-space:nowrap;
  }
  .badge .dot{ width:7px; height:7px; border-radius:50%; }
  .b-pendiente{ background:var(--amber-bg); color:#92400E; } .b-pendiente .dot{ background:var(--amber); }
  .b-firmado{ background:var(--green-bg); color:#166534; } .b-firmado .dot{ background:var(--green); }
  .b-por_exportar{ background:var(--blue-bg); color:#1E40AF; } .b-por_exportar .dot{ background:var(--blue); }
  .b-eliminado{ background:var(--red-bg); color:#991B1B; } .b-eliminado .dot{ background:var(--red); }

  .actions{ display:flex; flex-wrap:wrap; gap:7px; }
  .actions .btn{ padding:8px 12px; font-size:13.5px; }
  .danger{ color:var(--red); }
  .danger:hover{ background:var(--red-bg); border-color:#FCA5A5; }

  /* ---------- Empty ---------- */
  .empty{ text-align:center; padding:54px 24px; color:var(--muted); }
  .empty .big{ width:54px; height:54px; margin:0 auto 14px; color:var(--border-strong); }
  .empty h2{ font-size:17px; color:var(--ink); margin:0 0 6px; font-weight:600; }
  .empty p{ margin:0 0 18px; font-size:14px; }

  /* ---------- Signing overlay ---------- */
  .sheet{
    position:fixed; inset:0; z-index:60; background:var(--bg); display:none;
    flex-direction:column; padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .sheet.show{ display:flex; }
  .sheet-head{
    display:flex; align-items:center; gap:10px; padding:11px 14px; border-bottom:1px solid var(--border);
    background:var(--surface);
  }
  .sheet-head .title{ flex:1; min-width:0; }
  .sheet-head .title .t{ font-weight:600; font-size:14.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .sheet-head .title .s{ font-family:var(--mono); font-size:11px; color:var(--faint); }

  .thumbs{
    display:flex; gap:10px; overflow-x:auto; padding:11px 14px; background:var(--surface-2);
    border-bottom:1px solid var(--border); scrollbar-width:thin;
  }
  .thumb{
    position:relative; flex:0 0 auto; border:2px solid var(--border-strong); border-radius:8px;
    overflow:hidden; background:#fff; padding:0; line-height:0; transition:border-color .1s ease;
  }
  .thumb canvas{ display:block; }
  .thumb[aria-pressed="true"]{ border-color:var(--ink); }
  .thumb .pg{ position:absolute; left:4px; bottom:4px; font-family:var(--mono); font-size:10px;
    background:rgba(28,28,30,.78); color:#fff; padding:1px 5px; border-radius:5px; }
  .thumb .sig-dot{ position:absolute; top:4px; right:4px; width:10px; height:10px; border-radius:50%;
    background:var(--green); border:1.5px solid #fff; display:none; }
  .thumb.has-sig .sig-dot{ display:block; }

  .stage{
    flex:1; position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center;
    background:repeating-conic-gradient(#f1f0ee 0% 25%, #fafaf9 0% 50%) 50% / 22px 22px;
    touch-action:none; user-select:none; -webkit-user-select:none;
  }
  .page-wrap{ position:absolute; left:0; top:0; box-shadow:0 6px 30px -10px rgba(0,0,0,.3); background:#fff; transform-origin:0 0; will-change:transform; }
  #pageCanvas{ display:block; }
  .stamps{ position:absolute; inset:0; }
  .stamp{
    position:absolute; box-sizing:border-box; border:1.5px dashed transparent; border-radius:4px;
    touch-action:none; cursor:grab;
  }
  .stamp img{ width:100%; height:100%; display:block; pointer-events:none; }
  .stamp.sel{ border-color:var(--blue); background:rgba(37,99,235,.06); }
  .stamp .handle{
    position:absolute; right:-11px; bottom:-11px; width:22px; height:22px; border-radius:50%;
    background:var(--blue); border:2px solid #fff; box-shadow:0 1px 4px rgba(0,0,0,.3);
    display:none; cursor:nwse-resize; touch-action:none;
  }
  .stamp .del{
    position:absolute; left:-11px; top:-11px; width:22px; height:22px; border-radius:50%;
    background:var(--red); border:2px solid #fff; color:#fff; display:none;
    align-items:center; justify-content:center; font-size:14px; line-height:1; cursor:pointer;
  }
  .stamp.sel .handle, .stamp.sel .del{ display:flex; }

  .stage .hint{
    position:absolute; bottom:14px; left:50%; transform:translateX(-50%);
    background:rgba(28,28,30,.82); color:#fff; font-size:12.5px; padding:7px 13px; border-radius:999px;
    pointer-events:none; transition:opacity .3s ease; text-align:center; max-width:88%;
  }
  .zoomctl{
    position:absolute; top:12px; right:12px; display:flex; gap:1px; background:var(--surface);
    border:1px solid var(--border-strong); border-radius:10px; overflow:hidden; box-shadow:var(--shadow);
  }
  .zoomctl button{ padding:8px 12px; font-size:15px; font-weight:600; color:var(--ink); min-width:40px; }
  .zoomctl button:nth-child(2){ border-left:1px solid var(--border); border-right:1px solid var(--border); font-size:12.5px; font-weight:550; }
  .zoomctl button:active{ background:var(--surface-2); }

  .sign-tools{
    display:flex; align-items:center; gap:10px; padding:11px 14px; border-top:1px solid var(--border);
    background:var(--surface); flex-wrap:wrap;
  }
  .toolnote{ font-size:12.5px; color:var(--muted); }
  .pentip{ display:flex; align-items:center; gap:9px; font-size:12.5px; color:var(--muted); }
  .pentip input[type=range]{ width:108px; accent-color:var(--ink); }
  .grow{ flex:1; }

  /* ---------- Recuadro para firmar (pad) ---------- */
  .pad-bg{ position:fixed; inset:0; background:rgba(28,28,30,.5); z-index:70; display:none; align-items:flex-end; justify-content:center; }
  .pad-bg.show{ display:flex; }
  .pad{ background:var(--surface); width:100%; max-width:680px; border-radius:18px 18px 0 0; padding:14px 16px calc(16px + env(safe-area-inset-bottom));
    box-shadow:0 -8px 40px -12px rgba(0,0,0,.4); }
  @media (min-width:560px){ .pad-bg{ align-items:center; } .pad{ border-radius:18px; margin:20px; } }
  .pad-head{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:10px; font-size:13.5px; font-weight:600; }
  .pad-canvas-wrap{ position:relative; border:1.5px solid var(--border-strong); border-radius:12px; background:
    linear-gradient(#fff,#fff) padding-box; overflow:hidden; height:200px; }
  #padCanvas{ display:block; width:100%; height:100%; touch-action:none; cursor:crosshair; position:relative; z-index:2; }
  .pad-baseline{ position:absolute; left:18px; right:18px; bottom:48px; border-bottom:1.5px dashed var(--border-strong); z-index:1; }
  .pad-ph{ position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); color:var(--faint); font-size:15px; z-index:1; pointer-events:none; }
  .pad-actions{ display:flex; align-items:center; gap:8px; margin-top:12px; }

  /* ---------- Toast & dialog ---------- */
  #toast{
    position:fixed; left:50%; bottom:calc(20px + env(safe-area-inset-bottom)); transform:translateX(-50%) translateY(20px);
    background:var(--ink); color:#fff; padding:11px 17px; border-radius:999px; font-size:13.5px; font-weight:550;
    z-index:90; opacity:0; pointer-events:none; transition:opacity .2s ease, transform .2s ease; max-width:90vw; text-align:center;
  }
  #toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  .modal-bg{ position:fixed; inset:0; background:rgba(28,28,30,.4); z-index:80; display:none; align-items:center; justify-content:center; padding:24px; }
  .modal-bg.show{ display:flex; }
  .modal{ background:var(--surface); border-radius:16px; padding:20px; max-width:340px; width:100%; box-shadow:var(--shadow); }
  .modal h3{ margin:0 0 6px; font-size:16px; }
  .modal p{ margin:0 0 18px; font-size:14px; color:var(--muted); }
  .modal .row{ display:flex; gap:9px; justify-content:flex-end; }

  .sr-only{ position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0 0 0 0); border:0; }

  @media (max-width:520px){
    .toolbar .btn span.lbl{ display:none; }
    .stat{ min-width:92px; }
  }
  @media (prefers-reduced-motion:reduce){ *{ transition:none !important; } }
</style>
</head>
<body>
<div id="app">
  <header class="bar">
    <div class="brand">
      <svg class="glyph" viewBox="0 0 32 32" fill="none" aria-hidden="true">
        <rect x="1" y="1" width="30" height="30" rx="8" fill="#1C1C1E"/>
        <path d="M8 21c3-1 4.5-9 6-9s1 7 2.5 7S19 12 21 12s2 5 3 5" stroke="#fff" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="24" cy="22.5" r="1.6" fill="#fff"/>
      </svg>
      <div>
        <h1>Resguardos</h1>
        <div class="sub">Firma digital · offline</div>
      </div>
    </div>
    <div class="toolbar">
      <div class="search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="m20 20-3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <input id="search" type="search" placeholder="Buscar resguardo…" autocomplete="off" />
      </div>
      <button class="btn btn-ghost btn-sm" id="btnFolder" title="Importar una carpeta de PDFs">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
        <span class="lbl">Carpeta</span>
      </button>
      <button class="btn btn-primary btn-sm" id="btnLoad">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M12 16V4m0 0 4 4m-4-4-4 4" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 17v2a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-2" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/></svg>
        <span class="lbl">Cargar PDF</span>
      </button>
    </div>
  </header>

  <section class="dash" id="dash" aria-label="Resumen de resguardos">
    <button class="stat" data-filter="todos" aria-pressed="true">
      <span class="n mono" id="c-todos">0</span>
      <span class="l"><span class="swatch sw-all"></span>Todos</span>
    </button>
    <button class="stat" data-filter="pendiente" aria-pressed="false">
      <span class="n mono" id="c-pendiente">0</span>
      <span class="l"><span class="swatch sw-pend"></span>Pendientes</span>
    </button>
    <button class="stat" data-filter="firmado" aria-pressed="false">
      <span class="n mono" id="c-firmado">0</span>
      <span class="l"><span class="swatch sw-firm"></span>Firmados</span>
    </button>
    <button class="stat" data-filter="por_exportar" aria-pressed="false">
      <span class="n mono" id="c-por_exportar">0</span>
      <span class="l"><span class="swatch sw-exp"></span>Por exportar</span>
    </button>
  </section>

  <div class="folderbar" id="folderbar">
    <div class="fb-info">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>
      <div class="fb-text"><b id="fbName">—</b><span id="fbSynced">—</span></div>
    </div>
    <div class="fb-actions">
      <button class="btn btn-ghost btn-sm" id="btnSync">Sincronizar</button>
      <button class="btn btn-ghost btn-sm" id="btnUnlink" title="Quitar carpeta">Quitar</button>
    </div>
  </div>

  <div class="queuebar" id="queuebar">
    <span id="queuetext">0 en cola para exportar</span>
    <button class="btn btn-sm" style="background:#fff;color:var(--blue);border:1px solid #BFDBFE" id="btnExportAll">Exportar todos</button>
  </div>

  <div class="listmeta">
    <span class="count" id="listcount">0 resguardos</span>
    <button class="trash-link" id="btnTrash" hidden>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M4 7h16M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2m2 0v12a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V7" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
      Papelera (<span id="trashcount">0</span>)
    </button>
  </div>

  <div class="list" id="list"></div>
</div>

<!-- Signing sheet -->
<div class="sheet" id="sheet" aria-hidden="true">
  <div class="sheet-head">
    <button class="btn btn-icon btn-ghost" id="btnClose" aria-label="Cerrar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="m6 6 12 12M18 6 6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
    <div class="title">
      <div class="t" id="sheetName">—</div>
      <div class="s" id="sheetSub">—</div>
    </div>
    <button class="btn btn-primary btn-sm" id="btnSaveSig">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="m5 12 5 5 9-11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Guardar firma
    </button>
  </div>
  <div class="thumbs" id="thumbs"></div>
  <div class="stage" id="stage">
    <div class="page-wrap" id="pageWrap">
      <canvas id="pageCanvas"></canvas>
      <div class="stamps" id="stamps"></div>
    </div>
    <div class="hint" id="signHint">Pellizca para acercar · arrastra para mover la hoja</div>
    <div class="zoomctl" id="zoomctl">
      <button id="zOut" aria-label="Alejar">−</button>
      <button id="zFit" aria-label="Ajustar">Ajustar</button>
      <button id="zIn" aria-label="Acercar">+</button>
    </div>
  </div>

/* ============================================================
   Almacenamiento — IndexedDB con respaldo en memoria
   (para que la vista previa nunca falle si el navegador
   bloquea el almacenamiento; al desplegarse persiste de verdad)
============================================================ */
const Store = (function(){
  const DB_NAME = "resguardos-db", STORE = "items", META = "meta", VERSION = 2;
  let dbPromise = null, mem = null;

  function useMemory(){
    if (!mem) mem = new Map();
    return true;
  }
  function openDB(){
    if (mem) return Promise.reject("mem");
    if (dbPromise) return dbPromise;
    dbPromise = new Promise((res, rej)=>{
      let req;
      try { req = indexedDB.open(DB_NAME, VERSION); }
      catch(e){ useMemory(); return rej(e); }
      req.onupgradeneeded = ()=>{
        const db = req.result;
        if (!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE, { keyPath:"id" });
        if (!db.objectStoreNames.contains(META))  db.createObjectStore(META,  { keyPath:"key" });
      };
      req.onsuccess = ()=> res(req.result);
      req.onerror = ()=>{ useMemory(); rej(req.error); };
    });
    return dbPromise;
  }
  function txStore(name, mode){
    return openDB().then(db=> db.transaction(name, mode).objectStore(name));
  }
  return {
    async getAll(){
      if (mem) return [...mem.entries()].filter(([k])=>!String(k).startsWith("meta:")).map(([,v])=>v);
      try{
        const os = await txStore(STORE,"readonly");
        return await new Promise((res,rej)=>{ const r=os.getAll(); r.onsuccess=()=>res(r.result||[]); r.onerror=()=>rej(r.error); });
      }catch(e){ useMemory(); return [...mem.entries()].filter(([k])=>!String(k).startsWith("meta:")).map(([,v])=>v); }
    },
    async put(item){
      if (mem){ mem.set(item.id, item); return item; }
      try{
        const os = await txStore(STORE,"readwrite");
        return await new Promise((res,rej)=>{ const r=os.put(item); r.onsuccess=()=>res(item); r.onerror=()=>rej(r.error); });
      }catch(e){ useMemory(); mem.set(item.id, item); return item; }
    },
    async del(id){
      if (mem){ mem.delete(id); return; }
      try{
        const os = await txStore(STORE,"readwrite");
        return await new Promise((res,rej)=>{ const r=os.delete(id); r.onsuccess=()=>res(); r.onerror=()=>rej(r.error); });
      }catch(e){ useMemory(); mem.delete(id); }
    },
    async getMeta(key){
      if (mem) return mem.has("meta:"+key) ? mem.get("meta:"+key) : null;
      try{
        const os = await txStore(META,"readonly");
        return await new Promise((res,rej)=>{ const r=os.get(key); r.onsuccess=()=>res(r.result?r.result.value:null); r.onerror=()=>rej(r.error); });
      }catch(e){ useMemory(); return mem.has("meta:"+key) ? mem.get("meta:"+key) : null; }
    },
    async setMeta(key, value){
      if (mem){ mem.set("meta:"+key, value); return; }
      try{
        const os = await txStore(META,"readwrite");
        return await new Promise((res,rej)=>{ const r=os.put({ key, value }); r.onsuccess=()=>res(); r.onerror=()=>rej(r.error); });
      }catch(e){ useMemory(); mem.set("meta:"+key, value); }
    }
  };
})();

   Estado y utilidades
============================================================ */
const STATUS = {
  pendiente:    { label:"Pendiente",    es:"pendiente" },
  firmado:      { label:"Firmado",      es:"firmado" },
  por_exportar: { label:"Por exportar", es:"por_exportar" },
  eliminado:    { label:"Eliminado",    es:"eliminado" },
};
const $ = s => document.querySelector(s);
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
function fmtDate(ts){
  if(!ts) return "—";
  const d = new Date(ts);
  return d.toLocaleDateString("es-MX",{day:"2-digit",month:"short"}) + " " +
         d.toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit"});
}
function bytesHuman(n){
  if(!n && n!==0) return "—";
  if(n < 1024) return n+" B";
  if(n < 1048576) return (n/1024).toFixed(0)+" KB";
  return (n/1048576).toFixed(1)+" MB";
}

let items = [];          // todos los resguardos
let filter = "todos";    // filtro activo
let query = "";          // búsqueda

/* ============================================================
   Toast + modal de confirmación
============================================================ */
let toastT;
function toast(msg){
  const t = $("#toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(toastT); toastT = setTimeout(()=> t.classList.remove("show"), 2200);
}
function confirmDialog(title, text, okLabel){
  return new Promise(res=>{
    $("#modalTitle").textContent = title;
    $("#modalText").textContent = text;
    $("#modalOk").textContent = okLabel || "Aceptar";
    const bg = $("#modalBg"); bg.classList.add("show");
    const done = (v)=>{ bg.classList.remove("show"); $("#modalOk").onclick=null; $("#modalCancel").onclick=null; bg.onclick=null; res(v); };
    $("#modalOk").onclick = ()=>done(true);
    $("#modalCancel").onclick = ()=>done(false);
    bg.onclick = (e)=>{ if(e.target===bg) done(false); };
  });
}

/* ============================================================
   Carga de PDFs (File System Access API + respaldo input)
============================================================ */
async function addPdfFile(file){
  const buf = await file.arrayBuffer();
  const item = {
    id: uid(),
    name: file.name.replace(/\.pdf$/i,""),
    fileName: file.name,
    status: "pendiente",
    size: buf.byteLength,
    pages: null,
    pdf: buf,                // ArrayBuffer del original
    signatures: {},          // { [pageIndex]: pngDataURL }
    createdAt: Date.now(),
    signedAt: null,
    exportedAt: null,
  };
  await Store.put(item);
  return item;
}

async function loadViaPicker(){
  if (window.showOpenFilePicker){
    try{
      const handles = await window.showOpenFilePicker({
        multiple:true,
        types:[{ description:"PDF", accept:{ "application/pdf":[".pdf"] } }],
      });
      let added = 0;
      for (const h of handles){ const f = await h.getFile(); await addPdfFile(f); added++; }
      if (added){ await refresh(); toast(added===1?"1 PDF cargado":added+" PDFs cargados"); }
      return;
    }catch(e){ if(e && e.name==="AbortError") return; /* si no, usa respaldo */ }
  }
  $("#fileInput").click();
}

/* ---------- Carpeta enlazada (toma PDFs de una app/carpeta externa) ----------
   Modelo "jalar": eliges una vez la carpeta donde la app externa deja los PDFs;
   la app recuerda el permiso y la vuelve a leer al abrir y al pulsar Sincronizar,
   importando solo los archivos nuevos. Requiere Chrome (Android/escritorio). */

async function scanFolderHandle(dir){
  const out = [];
  for await (const entry of dir.values()){
    if (entry.kind==="file" && /\.pdf$/i.test(entry.name)) out.push(entry);
  }
  return out;
}
function knownKeys(){
  return new Set(items.map(it => (it.fileName||"") + "|" + (it.size||0)));
}
async function importNewFromFolder(dir){
  const entries = await scanFolderHandle(dir);
  const known = knownKeys();
  let added = 0;
  for (const entry of entries){
    const f = await entry.getFile();
    const key = f.name + "|" + f.size;
    if (known.has(key)) continue;
    await addPdfFile(f); known.add(key); added++;
  }
  if (added) await refresh();
  return added;
}

async function linkOrSyncFolder(){
  if (!window.showDirectoryPicker){
    toast("Tu navegador no permite enlazar carpeta — usa Cargar PDF");
    $("#fileInput").click();
    return;
  }
  let dir = await Store.getMeta("folder");
  try{
    if (dir){
      const perm = await dir.requestPermission({ mode:"read" });
      if (perm !== "granted") dir = null;     // perdió permiso → re-elegir
    }
    if (!dir){
      dir = await window.showDirectoryPicker({ id:"resguardos-src", mode:"read" });
      await Store.setMeta("folder", dir);
    }
    const n = await importNewFromFolder(dir);
    await Store.setMeta("folderSyncedAt", Date.now());
    await renderFolderBar();
    toast(n ? (n===1 ? "1 PDF nuevo de la carpeta" : n+" PDFs nuevos de la carpeta") : "Carpeta al día, sin nuevos");
  }catch(e){ if(e && e.name!=="AbortError") toast("No se pudo leer la carpeta"); }
}

async function unlinkFolder(){
  await Store.setMeta("folder", null);
  await Store.setMeta("folderSyncedAt", null);
  await renderFolderBar();
  toast("Carpeta desvinculada");
}

async function autoSyncOnLaunch(){
  if (!window.showDirectoryPicker) return;
  const dir = await Store.getMeta("folder");
  if (!dir) return;
  try{
    const perm = await dir.queryPermission({ mode:"read" });
    if (perm !== "granted"){ await renderFolderBar(); return; }  // pedirá permiso al pulsar Sincronizar
    const n = await importNewFromFolder(dir);
    await Store.setMeta("folderSyncedAt", Date.now());
    await renderFolderBar();
    if (n) toast(n===1 ? "1 PDF nuevo de la carpeta" : n+" PDFs nuevos de la carpeta");
  }catch(e){ /* sin ruido en el arranque */ }
}

async function renderFolderBar(){
  const bar = $("#folderbar");
  const dir = await Store.getMeta("folder");
  if (!dir){ bar.classList.remove("show"); return; }
  bar.classList.add("show");
  $("#fbName").textContent = dir.name || "Carpeta enlazada";
  const ts = await Store.getMeta("folderSyncedAt");
  let perm = "prompt";
  try{ perm = await dir.queryPermission({ mode:"read" }); }catch(e){}
  $("#fbSynced").textContent = (perm!=="granted")
    ? "Toca Sincronizar para dar permiso"
    : (ts ? "Sincronizada " + fmtDate(ts) : "Lista para sincronizar");
}

$("#fileInput").addEventListener("change", async (e)=>{
  const files = [...e.target.files].filter(f=>/\.pdf$/i.test(f.name));
  let added = 0;
  for (const f of files){ await addPdfFile(f); added++; }
  e.target.value = "";
  if (added){ await refresh(); toast(added===1?"1 PDF cargado":added+" PDFs cargados"); }
});

/* ============================================================
   Render del tablero y la lista
============================================================ */
function counts(){
  const c = { todos:0, pendiente:0, firmado:0, por_exportar:0, eliminado:0 };
  for (const it of items){
    if (it.status==="eliminado"){ c.eliminado++; continue; }
    c.todos++; c[it.status]++;
  }
  return c;
}

function visibleItems(){
  let arr = items.filter(it => showTrash ? it.status==="eliminado" : it.status!=="eliminado");
  if (!showTrash && filter!=="todos") arr = arr.filter(it=>it.status===filter);
  if (query){
    const q = query.toLowerCase();
    arr = arr.filter(it => it.name.toLowerCase().includes(q));
  }
  return arr.sort((a,b)=> b.createdAt - a.createdAt);
}

function badge(status){
  const s = STATUS[status];
  return `<span class="badge b-${status}"><span class="dot"></span>${s.label}</span>`;
}

function cardActions(it){
  if (it.status==="eliminado"){
    return `<button class="btn btn-ghost" data-act="restore" data-id="${it.id}">Restaurar</button>
            <button class="btn btn-ghost danger" data-act="purge" data-id="${it.id}">Borrar definitivo</button>`;
  }
  let html = `<button class="btn btn-primary" data-act="sign" data-id="${it.id}">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M3 21l3-1 11-11-2-2L4 18l-1 3Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/><path d="m14 5 3-3 4 4-3 3" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>
      ${it.status==="pendiente" ? "Firmar" : "Volver a firmar"}</button>`;
  if (it.status==="firmado"){
    html += `<button class="btn btn-ghost" data-act="queue" data-id="${it.id}">Marcar por exportar</button>`;
    html += `<button class="btn btn-ghost" data-act="export" data-id="${it.id}">Exportar</button>`;
  }
  if (it.status==="por_exportar"){
    html += `<button class="btn btn-ghost" data-act="export" data-id="${it.id}">Exportar ahora</button>`;
    html += `<button class="btn btn-ghost" data-act="unqueue" data-id="${it.id}">Quitar de cola</button>`;
  }
  html += `<button class="btn btn-ghost danger" data-act="delete" data-id="${it.id}">Eliminar</button>`;
  return html;
}

function render(){
  const c = counts();
  $("#c-todos").textContent = c.todos;
  $("#c-pendiente").textContent = c.pendiente;
  $("#c-firmado").textContent = c.firmado;
  $("#c-por_exportar").textContent = c.por_exportar;

  document.querySelectorAll(".stat").forEach(b=>{
    b.setAttribute("aria-pressed", String(!showTrash && b.dataset.filter===filter));
  });

  // cola de exportación
  const qb = $("#queuebar");
  if (c.por_exportar > 0 && !showTrash){ qb.classList.add("show"); $("#queuetext").textContent = c.por_exportar + (c.por_exportar===1?" resguardo en cola":" resguardos en cola"); }
  else qb.classList.remove("show");

  // papelera
  const tb = $("#btnTrash");
  $("#trashcount").textContent = c.eliminado;
  tb.hidden = c.eliminado===0 && !showTrash;
  tb.classList.toggle("danger", showTrash);
  tb.querySelector("svg")?.setAttribute("aria-hidden","true");

  const arr = visibleItems();
  $("#listcount").textContent = showTrash
    ? (c.eliminado + (c.eliminado===1?" en papelera":" en papelera"))
    : (arr.length + (arr.length===1?" resguardo":" resguardos"));

  const list = $("#list");
  if (arr.length === 0){
    list.innerHTML = emptyState();
    bindEmpty();
    return;
  }
  list.innerHTML = arr.map(it=>{
    const signed = Object.keys(it.signatures||{}).length;
    return `<article class="card s-${it.status}">
      <div class="card-top">
        <svg class="doc-ico" viewBox="0 0 34 42" fill="none" aria-hidden="true">
          <path d="M5 1h17l7 7v32a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1Z" fill="#fff" stroke="var(--border-strong)" stroke-width="1.4"/>
          <path d="M22 1v7h7" stroke="var(--border-strong)" stroke-width="1.4" fill="none"/>
          <path d="M9 30c2-.6 3-6 4-6s.6 4.5 1.6 4.5S17 24 18.4 24s1.3 3.4 2 3.4" stroke="var(--green)" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="${signed?1:0}"/>
          <g stroke="var(--border-strong)" stroke-width="1.3" opacity="${signed?0:1}"><path d="M9 17h16M9 22h16M9 27h10"/></g>
        </svg>
        <div class="card-main">
          <div class="name">${escapeHtml(it.name)}</div>
          <div class="meta">${bytesHuman(it.size)} · <b>${fmtDate(it.createdAt)}</b>${signed?` · ${signed} ${signed===1?"hoja firmada":"hojas firmadas"}`:""}</div>
        </div>

function emptyState(){
  if (showTrash){
    return `<div class="empty">
      <svg class="big" viewBox="0 0 24 24" fill="none"><path d="M4 7h16M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2m2 0v12a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <h2>Papelera vacía</h2><p>Los resguardos eliminados aparecen aquí.</p></div>`;
  }
  if (query || filter!=="todos"){
    return `<div class="empty">
      <svg class="big" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.6"/><path d="m20 20-3-3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      <h2>Sin resultados</h2><p>No hay resguardos que coincidan con el filtro o la búsqueda.</p></div>`;
  }
  return `<div class="empty">
    <svg class="big" viewBox="0 0 24 24" fill="none"><path d="M5 3h9l5 5v13a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1Z" stroke="currentColor" stroke-width="1.5"/><path d="M14 3v5h5" stroke="currentColor" stroke-width="1.5"/></svg>
    <h2>Sin resguardos todavía</h2><p>Carga tus PDFs desde el dispositivo para empezar a firmar.</p>
    <button class="btn btn-primary" id="emptyLoad">Cargar PDF</button></div>`;
}
function bindEmpty(){ const b = $("#emptyLoad"); if(b) b.onclick = loadViaPicker; }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, m=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m])); }

/* ============================================================
   Acciones de tarjeta
============================================================ */
$("#list").addEventListener("click", async (e)=>{
  const btn = e.target.closest("[data-act]");
  if(!btn) return;
  const it = items.find(x=>x.id===btn.dataset.id);
  if(!it) return;
  const act = btn.dataset.act;

  if (act==="sign"){ openSheet(it); return; }
  if (act==="queue"){ it.status="por_exportar"; await Store.put(it); await refresh(); toast("Marcado por exportar"); return; }
  if (act==="unqueue"){ it.status="firmado"; await Store.put(it); await refresh(); toast("Quitado de la cola"); return; }
  if (act==="export"){ await exportItem(it); return; }
  if (act==="delete"){
    it.status="eliminado"; await Store.put(it); await refresh(); toast("Movido a la papelera"); return;
  }
  if (act==="restore"){ it.status = Object.keys(it.signatures||{}).length ? "firmado" : "pendiente"; await Store.put(it); await refresh(); toast("Restaurado"); return; }
  if (act==="purge"){
    const ok = await confirmDialog("Borrar definitivo", `Se eliminará "${it.name}" de este dispositivo. No se puede deshacer.`, "Borrar");
    if(ok){ await Store.del(it.id); items = items.filter(x=>x.id!==it.id); render(); toast("Eliminado del dispositivo"); }
    return;
  }
});

/* ============================================================
   Exportar (incrustar firma con pdf-lib + guardar en dispositivo)
============================================================ */
// normaliza el modelo de firmas: admite el formato viejo (dataURL de página completa)
// y el nuevo (lista de sellos {png,nx,ny,nw,nh})
function stampsOf(it, i){
  const v = (it.signatures||{})[i];
  if (!v) return [];
  if (typeof v === "string") return [{ png:v, nx:0, ny:0, nw:1, nh:1 }];
  return Array.isArray(v) ? v : [];
}

async function buildSignedBytes(it){
  const { PDFDocument } = PDFLib;
  const src = it.pdf.slice(0); // clon para no detener el ArrayBuffer original
  const doc = await PDFDocument.load(src);
  const pages = doc.getPages();
  for (const idx of Object.keys(it.signatures||{})){
    const i = parseInt(idx,10);
    if (i<0 || i>=pages.length) continue;
    const page = pages[i];
    const { width:W, height:H } = page.getSize();
    for (const s of stampsOf(it, i)){
      const png = await doc.embedPng(s.png);
      const w = s.nw * W, h = s.nh * H;
      const x = s.nx * W;
      const y = H - (s.ny * H) - h;   // PDF: origen abajo-izquierda
      page.drawImage(png, { x, y, width:w, height:h });
    }
  }
  return await doc.save();
}

async function exportItem(it){
  if (!Object.keys(it.signatures||{}).length){ toast("Este resguardo aún no tiene firma"); return; }
  toast("Generando PDF firmado…");
  let bytes;
  try{ bytes = await buildSignedBytes(it); }
  catch(e){ console.error(e); toast("No se pudo generar el PDF"); return; }
  const outName = it.name.replace(/\s+/g,"_") + "_firmado.pdf";
  const blob = new Blob([bytes], { type:"application/pdf" });
  let saved = false;

  if (window.showSaveFilePicker){
    try{
      const handle = await window.showSaveFilePicker({
        suggestedName: outName,
        types:[{ description:"PDF firmado", accept:{ "application/pdf":[".pdf"] } }],
      });
      const w = await handle.createWritable();
      await w.write(blob); await w.close();
      saved = true;
    }catch(e){ if(e && e.name==="AbortError") return; }
  }
  if (!saved){
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = outName; document.body.appendChild(a); a.click();
    a.remove(); setTimeout(()=>URL.revokeObjectURL(url), 4000);
    saved = true;
  }
  if (saved){
    it.exportedAt = Date.now();
    it.status = "firmado";
    await Store.put(it);
    await refresh();
    toast("Guardado: " + outName);
  }
}

$("#btnExportAll").addEventListener("click", async ()=>{
  const queue = items.filter(it=>it.status==="por_exportar");
  for (const it of queue){ await exportItem(it); }
});

/* ============================================================
   Hoja de firma — flujo de sello:
   1) la hoja se acerca/mueve con gestos SIN rayarla
   2) "Firmar" abre un recuadro aparte para dibujar la firma
   3) la firma queda como un sello que se arrastra y ajusta sobre el nombre
============================================================ */
const sheet     = $("#sheet");
const pageCanvas= $("#pageCanvas");
const pageWrap  = $("#pageWrap");
const stage     = $("#stage");
const stampsEl  = $("#stamps");

const clamp = (v,a,b)=> Math.max(a, Math.min(b, v));
function baseWidth(){ return parseFloat($("#penWidth").value) || 2.6; }
function imgAspect(src){
  return new Promise(res=>{ const im=new Image(); im.onload=()=>res((im.naturalWidth/im.naturalHeight)||2.2); im.onerror=()=>res(2.2); im.src=src; });
}

let sign = null;
// { item, pdfDoc, pageCount, pageIndex, stamps:{[i]:[{id,png,aspect,nx,ny,nw,nh}]},
//   baseW, baseH, view:{scale,tx,ty}, selId, lastSig, dirty }

async function openSheet(it){
  try{
    const data = it.pdf.slice(0);
    const pdfDoc = await pdfjsLib.getDocument({ data }).promise;
    if (it.pages == null){ it.pages = pdfDoc.numPages; await Store.put(it); }
    sign = { item: it, pdfDoc, pageCount: pdfDoc.numPages, pageIndex: 0,
             stamps:{}, baseW:0, baseH:0, view:{scale:1,tx:0,ty:0}, selId:null, lastSig:null, dirty:false };
    // cargar firmas existentes como sellos editables
    for (const k of Object.keys(it.signatures||{})){
      const i = parseInt(k,10), list=[];
      for (const s of stampsOf(it, i)){
        list.push({ id:uid(), png:s.png, aspect: await imgAspect(s.png), nx:s.nx, ny:s.ny, nw:s.nw, nh:s.nh });
        if (!sign.lastSig) sign.lastSig = { png:s.png, aspect: await imgAspect(s.png) };
      }
      sign.stamps[i] = list;
    }
    $("#sheetName").textContent = it.name;
    $("#btnReuse").hidden = !sign.lastSig;
    sheet.classList.add("show"); sheet.setAttribute("aria-hidden","false");
    document.body.style.overflow = "hidden";
    await buildThumbs();
    await selectPage(0);
  }catch(e){ console.error(e); toast("No se pudo abrir el PDF"); }
}

function closeSheet(){
  sheet.classList.remove("show"); sheet.setAttribute("aria-hidden","true");
  document.body.style.overflow = ""; sign = null;
}
$("#btnClose").addEventListener("click", async ()=>{
  if (sign && sign.dirty){
    const ok = await confirmDialog("Salir sin guardar", "Hay cambios sin guardar en este resguardo. ¿Salir de todas formas?", "Salir");
    if(!ok) return;
  }
  closeSheet();
});

async function buildThumbs(){
  const cont = $("#thumbs"); cont.innerHTML = "";
  for (let i=0;i<sign.pageCount;i++){
    const btn = document.createElement("button");
    btn.className = "thumb"; btn.dataset.i = i; btn.setAttribute("aria-pressed", String(i===0));
    if ((sign.stamps[i]||[]).length) btn.classList.add("has-sig");
    btn.innerHTML = `<span class="pg">${i+1}</span><span class="sig-dot"></span>`;
    cont.appendChild(btn);
    const page = await sign.pdfDoc.getPage(i+1);
    const vp = page.getViewport({ scale: 1 });
    const scale = 92 / vp.height;
    const v = page.getViewport({ scale });
    const c = document.createElement("canvas");
    c.width = Math.floor(v.width); c.height = Math.floor(v.height);
    await page.render({ canvasContext: c.getContext("2d"), viewport: v }).promise;
    btn.insertBefore(c, btn.firstChild);
  }
  if (!cont._bound){
    cont._bound = true;
    cont.addEventListener("click", (e)=>{
      const t = e.target.closest(".thumb"); if(!t) return;
      selectPage(parseInt(t.dataset.i,10));
    });
  }
}

let renderTask = null;
async function selectPage(i){
  if (!sign) return;
  sign.pageIndex = i; sign.selId = null;
  document.querySelectorAll(".thumb").forEach(t=> t.setAttribute("aria-pressed", String(parseInt(t.dataset.i,10)===i)));
  $("#sheetSub").textContent = `Hoja ${i+1} de ${sign.pageCount}`;

  const page = await sign.pdfDoc.getPage(i+1);
  const base = page.getViewport({ scale: 1 });
  const pad = 20;
  const availW = stage.clientWidth  - pad*2;
  const availH = stage.clientHeight - pad*2;
  let fit = Math.min(availW / base.width, availH / base.height);
  fit = Math.max(0.2, Math.min(fit, 3));
  const dpr = Math.min(window.devicePixelRatio || 1, 2.5);
  const vp = page.getViewport({ scale: fit });
  const cssW = Math.floor(vp.width), cssH = Math.floor(vp.height);

  sign.baseW = cssW; sign.baseH = cssH;
  pageWrap.style.width = cssW+"px"; pageWrap.style.height = cssH+"px";
  pageCanvas.width = Math.floor(cssW*dpr); pageCanvas.height = Math.floor(cssH*dpr);
  pageCanvas.style.width = cssW+"px"; pageCanvas.style.height = cssH+"px";
  const pctx = pageCanvas.getContext("2d");
  pctx.setTransform(dpr,0,0,dpr,0,0);
  if (renderTask){ try{ renderTask.cancel(); }catch(_){} }
  renderTask = page.render({ canvasContext: pctx, viewport: vp });
  await renderTask.promise.catch(()=>{});

  sign.view = { scale:1, tx:0, ty:0 };
  clampView(); applyTransform();
  renderStamps();
}

/* ---------- Zoom / desplazamiento de la hoja (sin rayar) ---------- */
function applyTransform(){
  const v = sign.view;
  pageWrap.style.transform = `translate(${v.tx}px, ${v.ty}px) scale(${v.scale})`;
}
function clampView(){
  const v = sign.view;
  const sw = sign.baseW * v.scale, sh = sign.baseH * v.scale;
  const m = 40, W = stage.clientWidth, H = stage.clientHeight;
  v.tx = sw <= W ? (W - sw)/2 : Math.min(m, Math.max(W - sw - m, v.tx));
  v.ty = sh <= H ? (H - sh)/2 : Math.min(m, Math.max(H - sh - m, v.ty));
}
function zoomAt(fx, fy, factor){
  const v = sign.view;
  const ns = clamp(v.scale * factor, 1, 6);
  v.tx = fx - (fx - v.tx) * (ns / v.scale);
  v.ty = fy - (fy - v.ty) * (ns / v.scale);
  v.scale = ns; clampView(); applyTransform();
}
$("#zIn").addEventListener("click", ()=>{ if(sign) zoomAt(stage.clientWidth/2, stage.clientHeight/2, 1.4); });
$("#zOut").addEventListener("click",()=>{ if(sign) zoomAt(stage.clientWidth/2, stage.clientHeight/2, 1/1.4); });
$("#zFit").addEventListener("click", ()=>{ if(!sign) return; sign.view={scale:1,tx:0,ty:0}; clampView(); applyTransform(); });

// gestos sobre el escenario (pellizco + arrastre); NO dibuja
const ptrs = new Map();
let panLast = null, pinchStart = null;
function stageXY(e){ const r = stage.getBoundingClientRect(); return { x:e.clientX-r.left, y:e.clientY-r.top }; }
stage.addEventListener("pointerdown", (e)=>{
  if (!sign) return;
  if (e.target.closest(".stamp")) return;        // los sellos se mueven solos
  if (e.target.closest(".zoomctl")) return;
  stage.setPointerCapture(e.pointerId);
  ptrs.set(e.pointerId, stageXY(e));
  if (ptrs.size === 1){ panLast = stageXY(e); selectStamp(null); }
  if (ptrs.size === 2){
    const [a,b] = [...ptrs.values()];
    pinchStart = { dist: Math.hypot(a.x-b.x, a.y-b.y), scale: sign.view.scale,
                   cx:(a.x+b.x)/2, cy:(a.y+b.y)/2 };
  }
});
stage.addEventListener("pointermove", (e)=>{
  if (!sign || !ptrs.has(e.pointerId)) return;
  ptrs.set(e.pointerId, stageXY(e));
  if (ptrs.size >= 2 && pinchStart){
    const [a,b] = [...ptrs.values()];
    const dist = Math.hypot(a.x-b.x, a.y-b.y);
    const target = clamp(pinchStart.scale * (dist/pinchStart.dist), 1, 6);
    zoomAt(pinchStart.cx, pinchStart.cy, target / sign.view.scale);
  } else if (ptrs.size === 1 && panLast && sign.view.scale > 1){
    const p = stageXY(e);
    sign.view.tx += p.x - panLast.x; sign.view.ty += p.y - panLast.y;
    panLast = p; clampView(); applyTransform();
  }
});
function stageUp(e){ ptrs.delete(e.pointerId); if(ptrs.size<2) pinchStart=null; if(ptrs.size===0) panLast=null; }
stage.addEventListener("pointerup", stageUp);
stage.addEventListener("pointercancel", stageUp);
window.addEventListener("resize", ()=>{ if(sign) selectPage(sign.pageIndex); });

/* ---------- Sellos de firma (arrastrar / ajustar / borrar) ---------- */
function styleStamp(el, s){
  el.style.left   = (s.nx*100)+"%";
  el.style.top    = (s.ny*100)+"%";
  el.style.width  = (s.nw*100)+"%";
  el.style.height = (s.nh*100)+"%";
}
function renderStamps(){
  stampsEl.innerHTML = "";
  const list = sign.stamps[sign.pageIndex] || [];
  for (const s of list){
    const el = document.createElement("div");
    el.className = "stamp" + (s.id===sign.selId ? " sel" : "");
    el.dataset.id = s.id;
    el.innerHTML = `<img src="${s.png}" alt="firma" /><button class="del" aria-label="Quitar firma">×</button><span class="handle"></span>`;
    styleStamp(el, s);
    attachStamp(el, s);
    stampsEl.appendChild(el);
  }
  // dot de firma en miniatura + pista
  const thumb = document.querySelector(`.thumb[data-i="${sign.pageIndex}"]`);
  if (thumb) thumb.classList.toggle("has-sig", list.length>0);
  $("#signHint").style.opacity = list.length ? "0" : "1";
  $("#toolnote").textContent = list.length ? "Arrastra la firma sobre el nombre" : "Coloca tu firma sobre el nombre";
}
function selectStamp(id){
  sign.selId = id;
  document.querySelectorAll(".stamp").forEach(el=> el.classList.toggle("sel", el.dataset.id===id));
}
function attachStamp(el, s){
  // mover
  el.addEventListener("pointerdown", (e)=>{
    if (e.target.classList.contains("handle") || e.target.classList.contains("del")) return;
    e.stopPropagation(); el.setPointerCapture(e.pointerId);
    selectStamp(s.id);
    const start = { x:e.clientX, y:e.clientY, nx:s.nx, ny:s.ny };
    el.style.cursor = "grabbing";
    const move = (ev)=>{
      const dx = (ev.clientX - start.x) / sign.view.scale / sign.baseW;
      const dy = (ev.clientY - start.y) / sign.view.scale / sign.baseH;
      s.nx = clamp(start.nx + dx, 0, 1 - s.nw);
      s.ny = clamp(start.ny + dy, 0, 1 - s.nh);
      styleStamp(el, s); sign.dirty = true;
    };
    const up = (ev)=>{ el.releasePointerCapture(ev.pointerId); el.removeEventListener("pointermove",move); el.removeEventListener("pointerup",up); el.style.cursor="grab"; };
    el.addEventListener("pointermove", move);
    el.addEventListener("pointerup", up);
  });
  // ajustar tamaño (manteniendo proporción)
  const handle = el.querySelector(".handle");
  handle.addEventListener("pointerdown", (e)=>{
    e.stopPropagation(); handle.setPointerCapture(e.pointerId);
    selectStamp(s.id);
    const start = { x:e.clientX, nw:s.nw };
    const move = (ev)=>{
      const dW = (ev.clientX - start.x) / sign.view.scale / sign.baseW;
      let nw = clamp(start.nw + dW, 0.06, 1 - s.nx);
      const visualW = nw * sign.baseW, visualH = visualW / s.aspect;
      s.nw = nw; s.nh = clamp(visualH / sign.baseH, 0.02, 1 - s.ny);
      styleStamp(el, s); sign.dirty = true;
    };
    const up = (ev)=>{ handle.releasePointerCapture(ev.pointerId); handle.removeEventListener("pointermove",move); handle.removeEventListener("pointerup",up); };
    handle.addEventListener("pointermove", move);
    handle.addEventListener("pointerup", up);
  });
  // borrar
  el.querySelector(".del").addEventListener("click", (e)=>{
    e.stopPropagation();
    const list = sign.stamps[sign.pageIndex] || [];
    const idx = list.findIndex(x=>x.id===s.id);
    if (idx>=0) list.splice(idx,1);
    sign.dirty = true; sign.selId = null; renderStamps();
  });
}

function placeStamp(png, aspect){
  const i = sign.pageIndex;
  if (!sign.stamps[i]) sign.stamps[i] = [];
  const nw = 0.32;
  const visualH = (nw * sign.baseW) / aspect;
  const nh = clamp(visualH / sign.baseH, 0.03, 0.5);
  const st = { id:uid(), png, aspect, nw, nh,
               nx: clamp(0.5 - nw/2, 0, 1-nw), ny: clamp(0.64 - nh/2, 0, 1-nh) };
  sign.stamps[i].push(st);
  sign.selId = st.id; sign.dirty = true;
  renderStamps();
}

/* ---------- Recuadro para firmar (pad) ---------- */
const padBg = $("#padBg"), padCanvas = $("#padCanvas"), pctx = padCanvas.getContext("2d");
let padStrokes = [], padDraw = false, padCur = null, padDims = {w:0,h:0,dpr:1};

function openPad(){
  padBg.classList.add("show"); padBg.setAttribute("aria-hidden","false");
  $("#padPh").style.display = "block";
  requestAnimationFrame(()=>{
    const r = padCanvas.getBoundingClientRect();
    padDims.dpr = Math.min(window.devicePixelRatio||1, 2.5);
    padDims.w = r.width; padDims.h = r.height;
    padCanvas.width = Math.floor(r.width*padDims.dpr); padCanvas.height = Math.floor(r.height*padDims.dpr);
    padStrokes = []; redrawPad();
  });
}
function closePad(){ padBg.classList.remove("show"); padBg.setAttribute("aria-hidden","true"); }
function padPt(e){
  const r = padCanvas.getBoundingClientRect();
  return { x:(e.clientX-r.left)/r.width, y:(e.clientY-r.top)/r.height,
           p:(e.pointerType==="pen"&&e.pressure>0)?e.pressure:0.5 };
}
function padSeg(a,b){
  const bw = baseWidth();
  pctx.lineCap="round"; pctx.lineJoin="round"; pctx.strokeStyle="#111";
  pctx.lineWidth = bw*(0.45+((a.p+b.p)/2)*1.3);
  pctx.beginPath(); pctx.moveTo(a.x*padDims.w, a.y*padDims.h); pctx.lineTo(b.x*padDims.w, b.y*padDims.h); pctx.stroke();
}
function redrawPad(){
  pctx.setTransform(padDims.dpr,0,0,padDims.dpr,0,0);
  pctx.clearRect(0,0,padDims.w,padDims.h);
  for (const st of padStrokes){ for(let k=1;k<st.length;k++) padSeg(st[k-1],st[k]); }
}
padCanvas.addEventListener("pointerdown",(e)=>{ padCanvas.setPointerCapture(e.pointerId); padDraw=true; padCur=[padPt(e)]; padStrokes.push(padCur); $("#padPh").style.display="none"; e.preventDefault(); });
padCanvas.addEventListener("pointermove",(e)=>{ if(!padDraw||!padCur) return; const evs=e.getCoalescedEvents?e.getCoalescedEvents():[e]; for(const ev of evs){ const p=padPt(ev); padSeg(padCur[padCur.length-1],p); padCur.push(p);} e.preventDefault(); },{passive:false});
function padEnd(){ padDraw=false; padCur=null; }
padCanvas.addEventListener("pointerup",padEnd); padCanvas.addEventListener("pointercancel",padEnd);
$("#padUndo").addEventListener("click",()=>{ padStrokes.pop(); redrawPad(); if(!padStrokes.length) $("#padPh").style.display="block"; });
$("#padClear").addEventListener("click",()=>{ padStrokes=[]; redrawPad(); $("#padPh").style.display="block"; });
$("#padCancel").addEventListener("click", closePad);
$("#penWidth").addEventListener("input", redrawPad);

$("#padUse").addEventListener("click", async ()=>{
  if (!padStrokes.length){ toast("Dibuja tu firma primero"); return; }
  const sig = trimSignature();        // {png, aspect}
  sign.lastSig = sig; $("#btnReuse").hidden = false;
  placeStamp(sig.png, sig.aspect);
  closePad();
  toast("Arrastra la firma sobre el nombre");
});
$("#btnOpenPad").addEventListener("click", ()=>{ if(sign) openPad(); });
$("#btnReuse").addEventListener("click", ()=>{ if(sign && sign.lastSig) placeStamp(sign.lastSig.png, sign.lastSig.aspect); });

// recorta la firma a su contorno y la entrega como PNG nítido + proporción
function trimSignature(){
  let x0=1,y0=1,x1=0,y1=0;
  for (const st of padStrokes) for (const pt of st){ x0=Math.min(x0,pt.x); y0=Math.min(y0,pt.y); x1=Math.max(x1,pt.x); y1=Math.max(y1,pt.y); }
  const mx=0.04, my=0.08;
  x0=clamp(x0-mx,0,1); y0=clamp(y0-my,0,1); x1=clamp(x1+mx,0,1); y1=clamp(y1+my,0,1);
  const bw = Math.max(0.04, x1-x0), bh = Math.max(0.04, y1-y0);
  const aspectPx = (bw*padDims.w) / (bh*padDims.h);
  const OUT_W = 1000, OUT_H = Math.round(OUT_W / aspectPx);
  const c = document.createElement("canvas"); c.width=OUT_W; c.height=OUT_H;
  const g = c.getContext("2d");
  g.lineCap="round"; g.lineJoin="round"; g.strokeStyle="#111";
  const scaleW = baseWidth() * (OUT_W/(bw*padDims.w)) * 0.9;
  const mapX = nx => ((nx - x0)/bw)*OUT_W, mapY = ny => ((ny - y0)/bh)*OUT_H;
  for (const st of padStrokes){
    for (let k=1;k<st.length;k++){ const a=st[k-1], b=st[k];
      g.lineWidth = scaleW*(0.45+((a.p+b.p)/2)*1.3);
      g.beginPath(); g.moveTo(mapX(a.x),mapY(a.y)); g.lineTo(mapX(b.x),mapY(b.y)); g.stroke(); }
  }
  return { png: c.toDataURL("image/png"), aspect: OUT_W/OUT_H };
}

/* ---------- Guardar firma ---------- */
$("#btnSaveSig").addEventListener("click", async ()=>{
  if(!sign) return;
  const it = sign.item;
  it.signatures = {};
  for (const k of Object.keys(sign.stamps)){
    const i = parseInt(k,10);
    const list = sign.stamps[i] || [];
    if (list.length) it.signatures[i] = list.map(s=>({ png:s.png, nx:s.nx, ny:s.ny, nw:s.nw, nh:s.nh }));
  }
  const total = Object.keys(it.signatures).length;
  if (total === 0){ it.status = "pendiente"; it.signedAt = null; }
  else { if (it.status==="pendiente" || it.status==="eliminado") it.status = "firmado"; it.signedAt = Date.now(); }
  await Store.put(it);
  sign.dirty = false;
  await refresh(); closeSheet();
  toast(total ? "Firma guardada" : "Firma eliminada");
});

/* ============================================================
   Filtros, búsqueda, papelera
============================================================ */
$("#dash").addEventListener("click", (e)=>{
  const b = e.target.closest(".stat"); if(!b) return;
  showTrash = false; filter = b.dataset.filter; render();
});
$("#search").addEventListener("input", (e)=>{ query = e.target.value.trim(); render(); });
$("#btnTrash").addEventListener("click", ()=>{ showTrash = !showTrash; if(showTrash) filter="todos"; render(); });
$("#btnLoad").addEventListener("click", loadViaPicker);
$("#btnFolder").addEventListener("click", linkOrSyncFolder);
$("#btnSync").addEventListener("click", linkOrSyncFolder);
$("#btnUnlink").addEventListener("click", unlinkFolder);

/* ============================================================
   Recibir PDFs desde otra app
   1) "Abrir con / Compartir → Resguardos" abre el archivo en launchQueue
   2) Compartir varios PDFs llega por el service worker → ?imported=N
============================================================ */
// (2) confirmación de archivos llegados por Compartir
(function(){
  const u = new URL(location.href);
  if (u.searchParams.has("imported")){
    const n = parseInt(u.searchParams.get("imported")||"0",10);
    u.searchParams.delete("imported");
    history.replaceState({}, "", u.pathname + (u.search ? "?"+u.searchParams.toString() : ""));
    if (n) setTimeout(()=> toast(n===1 ? "1 PDF recibido" : n+" PDFs recibidos"), 500);
  }
})();
// (1) File Handling API
if ("launchQueue" in window && window.launchQueue && window.launchQueue.setConsumer){
  window.launchQueue.setConsumer(async (params)=>{
    if (!params || !params.files || !params.files.length) return;
    let added = 0;
    for (const handle of params.files){
      try{ const f = await handle.getFile(); if(/\.pdf$/i.test(f.name)){ await addPdfFile(f); added++; } }catch(e){}
    }
    if (added){ await refresh(); toast(added===1 ? "1 PDF abierto" : added+" PDFs abiertos"); }
  });
}

/* ============================================================
   Arranque
============================================================ */
async function refresh(){ items = await Store.getAll(); render(); }

(async function init(){
  await refresh();
  await renderFolderBar();
  autoSyncOnLaunch();   // jala PDFs nuevos de la carpeta enlazada (si ya hay permiso)
})();

/* ============================================================
   Service worker (solo cuando está desplegado en HTTPS)
============================================================ */
if ("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{
    navigator.serviceWorker.register("sw.js").catch(()=>{ /* en vista previa puede no registrarse; es normal */ });
  });
}
})();
